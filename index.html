<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sol's Embed Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #fff;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card,
        .preview {
            flex: 1 1 480px;
            background: #28283e;
            padding: 20px;
            border-radius: 12px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #ddd;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 2px solid #555;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #4cafef;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background: #3aa0f3;
        }

        pre {
            background: #2a2a3f;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .embed {
            background: #36393f;
            padding: 12px;
            border-radius: 8px;
        }

        .author {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
        }

        .description-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .stripe {
            width: 4px;
            border-radius: 2px;
        }

        .desc-text {
            flex: 1;
        }

        .blockquote-line {
            border-left: 4px solid #4f545c;
            padding-left: 8px;
            margin: 2px 0;
        }

        .fields {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .field {
            background: #2f3136;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .footer {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }

        code {
            background: #2f3136;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .link-note {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        a {
            color: #4cafef;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .rarity-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rarity-container input[type="checkbox"] {
            width: auto;
            margin-top: 0;
        }
    </style>
</head>

<body>

    <h1>Sol's Embed Generator</h1>

    <div class="container">
        <div class="card">
            <label>Top Username</label>
            <input id="topUsername" placeholder="DisplayName(@Username)" oninput="updatePreview()" />

            <label>Description</label>
            <textarea id="description" placeholder="The Blinding Light has devoured *Username*"
                oninput="updatePreview()"></textarea>

            <label>Star & Stripe Color</label>
            <select id="stripeColor" onchange="updatePreview(); updateEmojiByStripe();">
                <option value="#4d5efa">Default</option>
                <option value="#a5dffa">Luminosity</option>
                <option value="#5b50d1">Breakthrough</option>
                <option value="#874dfa">Oblivion</option>
                <option value="#5844ba">Memory</option>
                <option value="#fa4d4d">PIXELATION</option>
                <option value="#24b9be">Leviathan</option>
                <option value="#808080">EQUINOX</option>
            </select>

            <label>Rolls</label>
            <input id="rolls" placeholder="---,---,---" oninput="updatePreview()" />

            <label>Rarity</label>
            <div class="rarity-container">
                <input id="rarity" placeholder="---,---,---" oninput="updatePreview()" />
                <input type="checkbox" id="fromGlitched" onchange="updatePreview()" /> [From Glitched!]
            </div>

            <label>Luck</label>
            <input id="luck" placeholder="---,---.---" oninput="updatePreview()" />

            <label>Unix Timestamp</label>
            <input id="timestamp" placeholder="0000000000" oninput="updatePreview()" />
            <div class="link-note"><a href="https://www.unixtimestamp.com" target="_blank"
                    rel="noopener noreferrer">Check current timestamp</a></div>

            <label>Footer Time</label>
            <div style="display:flex; gap:10px;">
                <input id="footerHour" type="number" placeholder="HH" oninput="updatePreview()" />
                <input id="footerMinute" type="number" placeholder="MM" oninput="updatePreview()" />
                <select id="footerAMPM" onchange="updatePreview()">
                    <option>AM</option>
                    <option>PM</option>
                </select>
            </div>

            <button onclick="generateJSON()">Generate JSON</button>
            <div class="link-note"><a href="https://discohook.org/" target="_blank" rel="noopener noreferrer">Paste your
                    JSON code under the "JSON DATA EDITOR" tab</a></div>

        </div>

        <div class="preview">
            <h2>Live Preview</h2>
            <div class="embed">
                <div class="author">
                    <img id="previewEmoji" style="height:20px; display:none;" />
                    <span id="previewUsername"></span>
                </div>
                <div class="description-container">
                    <div class="stripe"></div>
                    <div class="desc-text"></div>
                </div>
                <div class="fields"></div>
                <div class="footer"></div>
            </div>
            <pre id="output"></pre>
        </div>
    </div>

    <script>
        const stripeEmojiMap = {
            "#4d5efa": "https://cdn.mongoosee.com/assets/stars/Global.png",
            "#a5dffa": "https://cdn.mongoosee.com/assets/stars/Luminosity.png",
            "#5b50d1": "https://cdn.mongoosee.com/assets/stars/BREAKTHROUGH.png",
            "#874dfa": "https://cdn.mongoosee.com/assets/stars/Oblivion.png",
            "#5844ba": "https://cdn.mongoosee.com/assets/stars/Memory.png",
            "#fa4d4d": "https://cdn.mongoosee.com/assets/stars/Pixelation.png",
            "#24b9be": "https://cdn.mongoosee.com/assets/stars/LEVIATHAN.png",
            "#808080": "https://cdn.mongoosee.com/assets/stars/Equinox.png"
        };

        function updateEmojiByStripe() {
            const stripe = document.getElementById("stripeColor").value;
            const emojiImg = document.getElementById("previewEmoji");
            if (stripeEmojiMap[stripe]) emojiImg.src = stripeEmojiMap[stripe];
            updatePreview();
        }

        function formatText(text) {
            return text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
                .replace(/\*(.*?)\*/g, "<em>$1</em>")
                .replace(/`(.*?)`/g, "<code>$1</code>")
                .replace(/\n/g, "<br>");
        }

        function formatNumber(x) { if (!x) return ""; x = x.replace(/,/g, ""); return Number(x).toLocaleString(); }
        function formatLuck(x) { if (!x) return ""; x = x.replace(/,/g, ""); return Number(x).toLocaleString(undefined, { maximumFractionDigits: 3 }); }

        function updatePreview() {
            const topUsername = document.getElementById("topUsername").value;
            let desc = document.getElementById("description").value;
            const rolls = formatNumber(document.getElementById("rolls").value);
            const rarityRaw = document.getElementById("rarity").value;
            const fromGlitched = document.getElementById("fromGlitched").checked;
            const luck = formatLuck(document.getElementById("luck").value);
            const timestamp = document.getElementById("timestamp").value;
            const stripe = document.getElementById("stripeColor").value || "#4d5efa";
            const hour = document.getElementById('footerHour').value.padStart(2, '0');
            const minute = document.getElementById('footerMinute').value.padStart(2, '0');
            const ampm = document.getElementById('footerAMPM').value;
            const footerTime = hour && minute ? `Today at ${hour}:${minute} ${ampm}` : "";

            // Rarity + From Glitched for default
            let rarityText = "", glitchedText = "";
            if (stripe.toLowerCase() === "#4d5efa") {
                if (rarityRaw) rarityText = `, CHANCE OF **1 IN ${formatNumber(rarityRaw)}**`;
                if (fromGlitched) glitchedText = ` **[From Glitched!]**`;
            }
            desc += rarityText + glitchedText;

            // Author
            const emojiImg = document.getElementById("previewEmoji");
            if (stripeEmojiMap[stripe]) emojiImg.style.display = "inline";
            document.getElementById("previewUsername").innerHTML = `<strong>${topUsername}</strong>`;

            // Description blockquote
            const formatted = formatText(desc).split("<br>");
            document.querySelector(".desc-text").innerHTML = formatted.map(line => `<div class="blockquote-line">${line}</div>`).join("");

            // Stripe color
            document.querySelector(".stripe").style.background = stripe;

            // Fields
            const fieldsDiv = document.querySelector(".fields");
            fieldsDiv.innerHTML = "";
            if (stripe.toLowerCase() === "#4d5efa") {
                if (rolls) fieldsDiv.innerHTML += `<div class="field"><strong>Rolls</strong><br>${rolls}</div>`;
                if (luck) fieldsDiv.innerHTML += `<div class="field"><strong>Luck</strong><br>${luck}</div>`;
                if (timestamp) fieldsDiv.innerHTML += `<div class="field"><strong>Time Discovered</strong><br>&lt;t:${timestamp}:R&gt;</div>`;
            } else {
                if (rolls) fieldsDiv.innerHTML += `<div class="field"><strong>Rolls</strong><br>${rolls}</div>`;
                if (rarityRaw) fieldsDiv.innerHTML += `<div class="field"><strong>Rarity</strong><br>${formatNumber(rarityRaw)}</div>`;
                if (luck) fieldsDiv.innerHTML += `<div class="field"><strong>Luck</strong><br>${luck}</div>`;
                if (timestamp) fieldsDiv.innerHTML += `<div class="field"><strong>Time Discovered</strong><br>&lt;t:${timestamp}:R&gt;</div>`;
            }

            document.querySelector(".footer").textContent = footerTime;
        }

        function generateJSON() {
            const topUsername = document.getElementById("topUsername").value.trim();
            let desc = document.getElementById("description").value;
            const rolls = formatNumber(document.getElementById("rolls").value);
            const rarityRaw = document.getElementById("rarity").value;
            const fromGlitched = document.getElementById("fromGlitched").checked;
            const luck = formatLuck(document.getElementById("luck").value);
            const timestamp = document.getElementById("timestamp").value;
            const stripe = document.getElementById("stripeColor").value || "#4d5efa";
            const hour = document.getElementById('footerHour').value.padStart(2, '0');
            const minute = document.getElementById('footerMinute').value.padStart(2, '0');
            const ampm = document.getElementById('footerAMPM').value;
            const footerTime = hour && minute ? `Today at ${hour}:${minute} ${ampm}` : "";

            // Rarity + From Glitched
            let rarityText = "", glitchedText = "";
            if (stripe.toLowerCase() === "#4d5efa") {
                if (rarityRaw) rarityText = `, CHANCE OF **1 IN ${formatNumber(rarityRaw)}**`;
                if (fromGlitched) glitchedText = ` **[From Glitched!]**`;
            }
            desc += rarityText + glitchedText;

            const discordDesc = desc.split("\n").map(line => `> ${line}`).join("\n");

            const embed = { description: discordDesc, color: parseInt(stripe.replace("#", ""), 16), fields: [], footer: { text: footerTime } };
            if (topUsername.length > 0) embed.author = { name: topUsername, icon_url: stripeEmojiMap[stripe] };

            // Fields
            if (stripe.toLowerCase() === "#4d5efa") {
                if (rolls) embed.fields.push({ name: "Rolls", value: rolls, inline: true });
                if (luck) embed.fields.push({ name: "Luck", value: luck, inline: true });
                if (timestamp) embed.fields.push({ name: "Time Discovered", value: `<t:${timestamp}:R>`, inline: true });
            } else {
                if (rolls) embed.fields.push({ name: "Rolls", value: rolls, inline: true });
                if (rarityRaw) embed.fields.push({ name: "Rarity", value: formatNumber(rarityRaw), inline: true });
                if (luck) embed.fields.push({ name: "Luck", value: luck, inline: true });
                if (timestamp) embed.fields.push({ name: "Time Discovered", value: `<t:${timestamp}:R>`, inline: true });
            }

            document.getElementById("output").textContent = JSON.stringify({ content: null, embeds: [embed], attachments: [] }, null, 2);
        }

        updateEmojiByStripe();
        updatePreview();
    </script>

</body>

</html>
